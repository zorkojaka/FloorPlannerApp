      tokov in envelope pravil. A/B izostritev kot v testnem problemu.
      Kar ne gre, se jasno javi z razlogom (steklena škatla), ne izpusti tiho.
    depends_on: [FP-009, FP-010]
    acceptance:
      - Demo: stara etaža → nova etaža, vsa oprema postavljena ali izrecno javljena kot neizvedljiva z razlogom.
      - Tokovi ljudje/material/odpadki so na novi etaži izrisani in ocenjeni.
