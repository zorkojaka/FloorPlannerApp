    status: inbox
    priority: P2
    effort: L
    agent: Claude Code
    spec: >-
      Iz načrta stare proizvodnje (slika/PDF/IFC) AI ekstrahira prostore in VSO
      opremo (stroji, mize, regali) z dimenzijami in pozicijami. Human-in-the-loop
