      Rezultat: inventar opreme kot vhod za selitev.
    depends_on: [FP-005, FP-009]
    acceptance:
      - Iz demo načrta proizvodnje nastane pregledan inventar opreme (tip, mere, soba).
      - Napačno prepoznan element se da ročno popraviti pred potrditvijo.

