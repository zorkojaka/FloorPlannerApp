tasks:
  # ── Sklop A: testni problem — pametnejši A/B izbor ──────────────────────
  - id: FP-001
    title: Aktivni izbor A/B parov na nivoju etaže (najprej raznolike opcije)
    status: done
    priority: P0
    effort: M
    agent: Claude Code
    spec: >-
      Korak 2 danes primerja prvaka z naslednjim po rangu (LegacyLayoutEngine.jsx:147)
      — torej med seboj PODOBNE kandidate. Sobni engine že ima aktivno učenje z
      informacijskim donosom (src/engine/active.ts: pairInformation + nextPair).
      Prenesi isti princip na FloorLayout: signali iz floorSignals() postanejo
      kanali z negotovostjo, par se izbere po največjem razdvoju negotovosti
      (explore) in postopno prehaja na kvaliteto (exploit, suggestedExplore).
    next_step: Izvedeno 2026-07-10 — src/project/floorActive.ts (nextFloorPairs, informacijski donos, zaupanje signalov), korak 2 kaže donos + raziskovanje; E2E preverjeno s Playwright.
    acceptance:
      - Prvi pari se med seboj razlikujejo po signalih bolj kot baseline prvak-vs-naslednji (test s povprečno razdaljo signalov).
      - Po ~10 primerjavah sistem prikazuje pare visoke kvalitete (izkoriščanje).
      - UI pokaže informacijski donos para (steklena škatla).

  - id: FP-002
    title: Raznolikost bazena kandidatov etaže (strukturno različne družine)
    status: done
    priority: P0
    effort: M
    agent: Claude Code
    spec: >-
      generateFloorLayoutPool generira samo variante istega trakastega (strip)
      generatorja — raznolikost je omejena na vrstni red sob in širine hodnikov.
      Da ima FP-001 med čim izbirati, dodaj strukturno različne družine:
      L-hodnik, dvojna hrbtenica, obodni hodnik, različna števila vrst.
      Dodaj mero raznolikosti bazena (razdalja med vektorji signalov).
    next_step: Izvedeno 2026-07-10 — forceCorridors (1/2/3 hodniki) + prečna orientacija v generateFloorLayoutPool; structuralFamilies + poolDiversity v UI (korak 2).
    depends_on: []
    acceptance:
      - Bazen vsebuje vsaj 3 strukturno različne družine tlorisov.
      - Deduplikacija ostane (ni identičnih kandidatov).
      - Mera raznolikosti bazena je izračunana in vidna v UI ali logu.

  - id: FP-003
    title: Aktivno A/B učenje pohištva + prenos naučenega med istovrstnimi sobami
    status: done
    priority: P0
    effort: M
    agent: Claude Code
    spec: >-
      Korak 3 drill-down danes primerja "trenutno seme vs naslednje seme" —
      naključni sosedi, brez učenja. Uporabi obstoječi nextPair (engine/active.ts)
      nad bazenom kandidatov sobe in shrani naučene uteži PER TIP SOBE (wc/office),
      ne per soba: izbira v eni pisarni izboljša postavitve vseh pisarn.
    next_step: Izvedeno 2026-07-10 — src/project/roomTypePreference.ts (kanali per tip sobe), roomCandidatePool + rangiranje v furnishFloorLayout, RoomDrill z A/B parom po informacijskem donosu.
    acceptance:
      - A/B par v sobi je izbran po informacijskem donosu, ne seed+1.
      - Izbire v eni pisarni spremenijo rangiranje postavitev v drugih pisarnah.
      - Uteži per tip sobe se ohranijo čez sejo (localStorage).

  - id: FP-004
    title: Konvergenca — sistem javi, kdaj je naučeno (etaža + sobe)
    status: done
    priority: P1
    effort: S
    agent: Claude Code
    spec: >-
      HANDOFF T4: zaznaj umiritev uteži. Po N doslednih izbirah (uteži se
      spreminjajo < epsilon) sistem javi konvergenco, predlaga prehod na
      izkoriščanje in neha spraševati. Velja za floor uteži (floorPreference)
      in per-roomType uteži (FP-003).
    next_step: Izvedeno 2026-07-10 — lastDeltas + converged v floorPreference in roomTypePreference, "enakovredni" šteje k umiritvi, UI značke "preference naučene ✓".
    depends_on: [FP-001, FP-003]
    acceptance:
      - Po N doslednih primerjavah UI pokaže "preference naučene" in ponudi zaključek.
      - Nedosledne izbire konvergenco upravičeno zamaknejo (test).

  # ── Sklop B: učenje iz naloženih načrtov ─────────────────────────────────
  - id: FP-005
    title: Knjižnica referenčnih načrtov (nalaganje, tipiziranje, trajnost)
    status: done
    priority: P1
    effort: M
    agent: Claude Code
    spec: >-
      Enotno mesto za nalaganje referenčnih načrtov (slika/PDF → AI ekstrakcija
      → verifikacijski overlay → shranjen NormalizedPlan). Vsaka referenca dobi
      tip: wc / pisarna / cela etaža / proizvodnja. Trajno shranjeno (localStorage,
      kasneje backend), reference se lahko doda/odstrani, indukcija se preračuna.
    next_step: Izvedeno 2026-07-10 — src/project/referenceLibrary.ts (tipizirane reference, kombinirani etažni profil iz vseh referenc, samodejno sklepanje tipa), UI v fazi Šolanje (shrani AI/IFC, odstrani s preračunom), localStorage persistenca; E2E preverjeno.
    acceptance:
      - Naložim 3 načrte WC in 2 etaži — vidim jih v knjižnici s tipom in povzetkom.
      - Odstranitev reference preračuna inducirana pravila brez spremembe kode.
      - Reference preživijo zaprtje/odprtje aplikacije.

  - id: FP-006
    title: Indukcija pravil pohištva iz referenc per tip sobe (WC, pisarna)
    status: done
    priority: P1
    effort: L
    agent: Claude Code
    spec: >-
      Danes so pravila pohištva v presetih hardcodana (floorFurnish.ts,
      elements/library.ts). HANDOFF T5/O9: iz referenc tipa "wc" oz. "pisarna"
      izračunaj opazovanja (clearance, odmiki, mere sob) in induciraj Envelope
      pravila (min→jedro, mediana→halo, p90→nasičenje, varianca→zaupanje),
      ki jih sobni generator dejansko uporablja. Pravila pregledna in uredljiva
      (steklena škatla). Ločeni rule-seti per tip sobe.
    next_step: Izvedeno 2026-07-10 — roomRuleSetsFromLibrary (opazovanja per tip sobe → envelope pravila), floorFurnish jih uporablja (applyInducedRules per sobo), AI-ekstrakcija zdaj prenaša elemente (prompt + parser), UI izlušči/prikaže/odstrani pravila. Testi ločenosti WC/pisarna + E2E.
    depends_on: [FP-005]
    acceptance:
      - Zamenjava nabora WC referenc spremeni WC postavitve brez spremembe kode.
      - Zamenjava WC referenc NE spremeni pravil za pisarne.
      - Vsako inducirano pravilo cita reference in je ročno popravljivo.

  - id: FP-007
    title: Etažna indukcija iz načrtov celih etaž + holdout validacija
    status: ready
    priority: P1
    effort: M
    agent: Claude Code
    spec: >-
      Iz referenc tipa "cela etaža" (več WC + pisarn) induciraj etažno strategijo:
      širine hodnikov, globine sob, razporeditev WC (centralno/razpršeno), cone.
      Osnova obstaja (ifc/floorStrategy.ts, project/zoneInduction.ts) — razširi
      na več parametrov in dodaj holdout poročilo (train/test): nauči se na delu
      referenc, preveri napoved na zadržanih (HANDOFF T6, merilna os a).
    next_step: Razširi floorStrategy + holdout poročilo v UI faze Šolanje.
    depends_on: [FP-005]
    acceptance:
      - Etažne reference spremenijo rangiranje kandidatov etaže brez spremembe kode.
      - Holdout poročilo pokaže številko ujemanja za vsak induciran parameter.

  - id: FP-008
    title: Tri merilne osi kot številke v UI (indukcija, posplošitev, donos preferenc)
    status: inbox
    priority: P2
    effort: S
    agent: Claude Code
    spec: >-
      HANDOFF §5.3: (a) kakovost indukcije na holdout setu, (b) posplošitev na
      nov brief, (c) donos preferenc — ocena pred in po N A/B primerjavah.
      Vsaka os ena številka, vidna v UI.
    depends_on: [FP-006, FP-007]
    acceptance:
      - Vse tri osi imajo izračunano številko na demo podatkih.

  # ── Sklop C: proizvodnja — končni cilj ───────────────────────────────────
